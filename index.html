<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2D Shape Visualizer</title>
<style>
  :root {
    --bg:        #0f1117;
    --panel:     #1a1d27;
    --accent:    #00d4ff;
    --accent2:   #ff6b6b;
    --text:      #e8eaf0;
    --muted:     #6b7280;
    --grid:      #1e2133;
    --input-bg:  #252837;
    --border:    #2e3348;
    --green:     #4ade80;
    --purple:    #a78bfa;
    --amber:     #fbbf24;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Courier New", Courier, monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── BANNER ─────────────────────────────────────────────────── */
  #banner {
    background: var(--panel);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 2px solid var(--accent);
    flex-shrink: 0;
  }
  #banner-label { color: var(--muted); font-size: 10px; letter-spacing: 0.12em; }
  #result-value { color: var(--accent2); font-size: 20px; font-weight: bold; min-width: 200px; }
  #formula      { color: var(--muted); font-size: 10px; margin-left: auto; letter-spacing: 0.06em; }

  /* ── SHAPE SELECTOR ─────────────────────────────────────────── */
  #shape-bar {
    background: #13151f;
    display: flex;
    gap: 6px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .shape-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 5px 14px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .shape-btn:hover { border-color: var(--accent); color: var(--accent); }
  .shape-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,212,255,0.08);
  }
  #shape-bar label {
    color: var(--muted);
    font-size: 10px;
    align-self: center;
    letter-spacing: 0.1em;
    margin-right: 4px;
  }

  /* ── BODY ───────────────────────────────────────────────────── */
  #body {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── CANVAS ─────────────────────────────────────────────────── */
  #canvas-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    overflow: hidden;
  }
  canvas {
    display: block;
    border: 1px solid var(--border);
    background: var(--bg);
  }

  /* ── SIDE PANEL ─────────────────────────────────────────────── */
  #panel {
    width: 200px;
    min-width: 200px;
    background: var(--panel);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 20px 16px;
    gap: 0;
    overflow-y: auto;
    flex-shrink: 0;
  }
  .panel-title {
    color: var(--accent);
    font-size: 12px;
    font-weight: bold;
    letter-spacing: 0.14em;
    margin-bottom: 4px;
  }
  .panel-divider {
    height: 1px;
    background: var(--accent);
    margin-bottom: 16px;
  }
  .panel-divider.muted { background: var(--border); margin-top: 12px; margin-bottom: 12px; }

  .field-label {
    color: var(--muted);
    font-size: 9px;
    letter-spacing: 0.1em;
    margin-bottom: 4px;
  }
  input[type=number], input[type=range] {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    font-weight: bold;
    text-align: center;
    padding: 6px 4px;
    outline: none;
    transition: border-color 0.15s;
    margin-bottom: 10px;
    -moz-appearance: textfield;
  }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
  input[type=number]:focus { border-color: var(--accent); }

  /* sides slider */
  input[type=range] {
    padding: 0;
    height: 28px;
    accent-color: var(--accent);
    cursor: pointer;
  }

  .stat-block { margin-bottom: 14px; }
  .stat-label { color: var(--muted); font-size: 9px; letter-spacing: 0.1em; }
  .stat-value { color: var(--accent); font-size: 14px; font-weight: bold; margin-top: 2px; }
  .stat-value.accent2 { color: var(--accent2); }
  .stat-value.green   { color: var(--green); }
  .stat-value.muted   { color: var(--muted); font-size: 11px; }

  /* ── responsive ─────────────────────────────────────────────── */
  @media (max-width: 640px) {
    #body { flex-direction: column; }
    #panel { width: 100%; min-width: unset; flex-direction: row; flex-wrap: wrap; gap: 12px; border-left: none; border-top: 1px solid var(--border); overflow-x: auto; }
    .panel-divider { display: none; }
    .stat-block, .field-label, input[type=number], input[type=range] { min-width: 110px; }
  }
</style>
</head>
<body>

<!-- BANNER -->
<div id="banner">
  <span id="banner-label">RESULT</span>
  <span id="result-value">—</span>
  <span id="formula">—</span>
</div>

<!-- SHAPE SELECTOR -->
<div id="shape-bar">
  <label>SHAPE</label>
  <button class="shape-btn active" data-shape="right-triangle">Right Triangle</button>
  <button class="shape-btn" data-shape="rectangle">Rectangle</button>
  <button class="shape-btn" data-shape="circle">Circle</button>
  <button class="shape-btn" data-shape="equilateral">Equilateral ▲</button>
  <button class="shape-btn" data-shape="polygon">Polygon</button>
  <button class="shape-btn" data-shape="ellipse">Ellipse</button>
</div>

<!-- BODY -->
<div id="body">
  <div id="canvas-wrap">
    <canvas id="c"></canvas>
  </div>

  <div id="panel">
    <div class="panel-title">DIMENSIONS</div>
    <div class="panel-divider"></div>

    <!-- inputs injected by JS -->
    <div id="inputs"></div>

    <div class="panel-divider muted"></div>

    <div class="stat-block">
      <div class="field-label">SCALE</div>
      <div class="stat-value muted" id="stat-scale">—</div>
    </div>
    <div class="panel-divider muted"></div>
    <div class="stat-block">
      <div class="field-label">AREA</div>
      <div class="stat-value" id="stat-area">—</div>
    </div>
    <div class="stat-block">
      <div class="field-label">PERIMETER</div>
      <div class="stat-value green" id="stat-perim">—</div>
    </div>
    <div class="stat-block">
      <div class="field-label">ANGLES</div>
      <div class="stat-value accent2" id="stat-angles">—</div>
    </div>
    <div class="stat-block">
      <div class="field-label">EXTRA</div>
      <div class="stat-value muted" id="stat-extra">—</div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const wrap   = document.getElementById('canvas-wrap');

// ── colours ──────────────────────────────────────────────────────────────────
const BG       = '#0f1117';
const ACCENT   = '#00d4ff';
const ACCENT2  = '#ff6b6b';
const GREEN    = '#4ade80';
const PURPLE   = '#a78bfa';
const AMBER    = '#fbbf24';
const MUTED    = '#3a3f55';
const STROKE   = '#00d4ff';
const BORDER   = '#2e3348';
const FILL     = 'rgba(0,212,255,0.06)';
const FILL2    = 'rgba(255,107,107,0.08)';

// ── state ─────────────────────────────────────────────────────────────────────
let shape  = 'right-triangle';
let params = {}; // keyed by field id → value

// ── shape definitions ─────────────────────────────────────────────────────────
const SHAPES = {
  'right-triangle': {
    fields: [
      { id:'base',   label:'BASE  (a)',   default:6  },
      { id:'height', label:'HEIGHT  (b)', default:4  },
    ],
    banner: (p) => {
      const h = hyp(p.base, p.height);
      return { value:`c = ${h.toFixed(4)}`, formula:'c = √(a² + b²)' };
    },
    stats: (p) => {
      const h = hyp(p.base, p.height);
      const area = 0.5 * p.base * p.height;
      const perim = p.base + p.height + h;
      const ab = deg(Math.atan2(p.height, p.base));
      const ah = 90 - ab;
      return {
        area:`${area.toFixed(2)} units²`,
        perim:`${perim.toFixed(4)} units`,
        angles:`90°  ·  ${ab.toFixed(1)}°  ·  ${ah.toFixed(1)}°`,
        extra:`hypotenuse: ${h.toFixed(4)}`
      };
    },
    draw: drawRightTriangle,
  },
  'rectangle': {
    fields: [
      { id:'width',  label:'WIDTH  (a)', default:8 },
      { id:'height', label:'HEIGHT (b)', default:5 },
    ],
    banner: (p) => ({ value:`diagonal = ${hyp(p.width,p.height).toFixed(4)}`, formula:'d = √(a² + b²)' }),
    stats: (p) => ({
      area:`${(p.width*p.height).toFixed(2)} units²`,
      perim:`${(2*(p.width+p.height)).toFixed(2)} units`,
      angles:`90°  ·  90°  ·  90°  ·  90°`,
      extra:`diagonal: ${hyp(p.width,p.height).toFixed(4)}`
    }),
    draw: drawRectangle,
  },
  'circle': {
    fields: [
      { id:'radius', label:'RADIUS  (r)', default:5 },
    ],
    banner: (p) => ({ value:`C = ${(2*Math.PI*p.radius).toFixed(4)}`, formula:'C = 2πr' }),
    stats: (p) => ({
      area:`${(Math.PI*p.radius**2).toFixed(4)} units²`,
      perim:`${(2*Math.PI*p.radius).toFixed(4)} units`,
      angles:`360° (continuous)`,
      extra:`diameter: ${(2*p.radius).toFixed(2)}`
    }),
    draw: drawCircle,
  },
  'equilateral': {
    fields: [
      { id:'side', label:'SIDE  (a)', default:7 },
    ],
    banner: (p) => ({ value:`h = ${(p.side * Math.sqrt(3)/2).toFixed(4)}`, formula:'h = a√3 / 2' }),
    stats: (p) => ({
      area:`${(Math.sqrt(3)/4*p.side**2).toFixed(4)} units²`,
      perim:`${(3*p.side).toFixed(2)} units`,
      angles:`60°  ·  60°  ·  60°`,
      extra:`height: ${(p.side*Math.sqrt(3)/2).toFixed(4)}`
    }),
    draw: drawEquilateral,
  },
  'polygon': {
    fields: [
      { id:'sides',  label:'SIDES  (n)',  default:6, min:3, max:12, isRange:true },
      { id:'radius', label:'RADIUS  (r)', default:5 },
    ],
    banner: (p) => ({ value:`n = ${Math.round(p.sides)} sides`, formula:`interior angle = ${((p.sides-2)*180/p.sides).toFixed(1)}°` }),
    stats: (p) => {
      const n = Math.round(p.sides), r = p.radius;
      const side = 2*r*Math.sin(Math.PI/n);
      const area = 0.5*n*r*r*Math.sin(2*Math.PI/n);
      const perim = n*side;
      const interior = (n-2)*180/n;
      return {
        area:`${area.toFixed(4)} units²`,
        perim:`${perim.toFixed(4)} units`,
        angles:`interior: ${interior.toFixed(2)}°`,
        extra:`side length: ${side.toFixed(4)}`
      };
    },
    draw: drawPolygon,
  },
  'ellipse': {
    fields: [
      { id:'a', label:'SEMI-MAJOR  (a)', default:7 },
      { id:'b', label:'SEMI-MINOR  (b)', default:4 },
    ],
    banner: (p) => {
      const e = Math.sqrt(1 - (Math.min(p.a,p.b)/Math.max(p.a,p.b))**2);
      return { value:`e = ${e.toFixed(4)}`, formula:'eccentricity = √(1 − b²/a²)' };
    },
    stats: (p) => {
      const ma = Math.max(p.a,p.b), mb = Math.min(p.a,p.b);
      const area = Math.PI*p.a*p.b;
      const h = ((ma-mb)/(ma+mb))**2;
      const perim = Math.PI*(ma+mb)*(1 + 3*h/(10+Math.sqrt(4-3*h)));
      const e = Math.sqrt(1-(mb/ma)**2);
      return {
        area:`${area.toFixed(4)} units²`,
        perim:`≈ ${perim.toFixed(4)} units`,
        angles:`360° (continuous)`,
        extra:`eccentricity: ${e.toFixed(4)}`
      };
    },
    draw: drawEllipse,
  },
};

// ── helpers ───────────────────────────────────────────────────────────────────
function hyp(a, b) { return Math.sqrt(a*a + b*b); }
function deg(r)    { return r * 180 / Math.PI; }

// ── dot-grid background ───────────────────────────────────────────────────────
function drawGrid() {
  const step = 30, W = canvas.width, H = canvas.height;
  ctx.fillStyle = '#1e2133';
  for (let x = 0; x <= W; x += step)
    for (let y = 0; y <= H; y += step)
      ctx.fillRect(x-1, y-1, 2, 2);
}

// ── axis guides ───────────────────────────────────────────────────────────────
function dashedLine(x1,y1,x2,y2,color='#2a3050') {
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth   = 1;
  ctx.setLineDash([4,6]);
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

// ── vertex dot ────────────────────────────────────────────────────────────────
function dot(x, y, color=ACCENT, r=5) {
  ctx.fillStyle = color;
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
}

// ── edge label ────────────────────────────────────────────────────────────────
function edgeLabel(x, y, text, color=ACCENT) {
  ctx.font      = '12px "Courier New",monospace';
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, x, y);
}

// ── dimension box ─────────────────────────────────────────────────────────────
function dimBox(cx, cy, value, label, color=ACCENT) {
  const w=80, h=34;
  const x=cx-w/2, y=cy-h/2;
  ctx.fillStyle='#0a0c12';
  ctx.fillRect(x+3,y+3,w,h);
  ctx.fillStyle='#252837';
  ctx.strokeStyle=color;
  ctx.lineWidth=1;
  ctx.fillRect(x,y,w,h);
  ctx.strokeRect(x,y,w,h);
  ctx.font      = '9px "Courier New",monospace';
  ctx.fillStyle = '#6b7280';
  ctx.textAlign='center'; ctx.textBaseline='bottom';
  ctx.fillText(label, cx, y);
  ctx.font      = '13px "Courier New",monospace';
  ctx.fontWeight= 'bold';
  ctx.fillStyle = color;
  ctx.textBaseline='middle';
  ctx.fillText(value, cx, cy);
}

// ── right-angle marker ────────────────────────────────────────────────────────
function rightAngleMark(x, y, sq=12) {
  ctx.strokeStyle = ACCENT;
  ctx.lineWidth   = 1;
  ctx.strokeRect(x, y-sq, sq, sq);
}

// ── canvas resize ─────────────────────────────────────────────────────────────
function resizeCanvas() {
  const r = wrap.getBoundingClientRect();
  canvas.width  = r.width  - 32;
  canvas.height = r.height - 32;
  redraw();
}

// ── compute scale so shape fills canvas with padding ─────────────────────────
function fitScale(dims) {
  const PAD = 90;
  const W = canvas.width, H = canvas.height;
  const scaleX = (W - 2*PAD) / dims.w;
  const scaleY = (H - 2*PAD) / dims.h;
  return Math.min(scaleX, scaleY);
}

// ──────────────────────────────────────────────────────────────────────────────
// DRAW FUNCTIONS
// ──────────────────────────────────────────────────────────────────────────────

function drawRightTriangle(p) {
  const { base, height } = p;
  const W=canvas.width, H=canvas.height, PAD=90;
  const scale = fitScale({w: base, h: height});
  const px_b = base*scale, px_h = height*scale;

  const x0 = PAD + (W-2*PAD-px_b)/2;
  const y0 = H - PAD - (H-2*PAD-px_h)/2;

  const A=[x0, y0], B=[x0+px_b, y0], C=[x0, y0-px_h];

  // axis guides
  dashedLine(A[0], y0, B[0], y0);
  dashedLine(x0, A[1], x0, C[1]);

  // right-angle marker
  rightAngleMark(A[0], A[1]);

  // filled triangle
  ctx.fillStyle = FILL;
  ctx.strokeStyle = STROKE;
  ctx.lineWidth   = 2.5;
  ctx.lineJoin    = 'round';
  ctx.beginPath();
  ctx.moveTo(...A); ctx.lineTo(...B); ctx.lineTo(...C); ctx.closePath();
  ctx.fill();

  // sides
  ctx.strokeStyle = ACCENT;   ctx.lineWidth=2.5; ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(...A); ctx.lineTo(...B); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(...A); ctx.lineTo(...C); ctx.stroke();

  ctx.strokeStyle = ACCENT2;  ctx.setLineDash([8,4]);
  ctx.beginPath(); ctx.moveTo(...C); ctx.lineTo(...B); ctx.stroke();
  ctx.setLineDash([]);

  // dots
  [A,B,C].forEach(pt=>dot(...pt));

  // edge labels
  const hv = hyp(base,height);
  edgeLabel((A[0]+B[0])/2, A[1]+20, `a = ${base}`, ACCENT);
  edgeLabel(A[0]-22, (A[1]+C[1])/2, `b = ${height}`, ACCENT);

  const mx=(C[0]+B[0])/2, my=(C[1]+B[1])/2;
  const dx=B[0]-C[0], dy=B[1]-C[1], ln=Math.hypot(dx,dy);
  edgeLabel(mx+(-dy/ln)*22, my+(dx/ln)*22, `c = ${hv.toFixed(2)}`, ACCENT2);

  // dim boxes
  dimBox((A[0]+B[0])/2, A[1]+54, `${base}`, 'BASE', ACCENT);
  dimBox(A[0]-62, (A[1]+C[1])/2, `${height}`, 'HEIGHT', ACCENT);

  // scale info
  const s = fitScale({w:base,h:height});
  updateScaleLabel(s, Math.max(base, height));
}

function drawRectangle(p) {
  const { width, height } = p;
  const W=canvas.width, H=canvas.height, PAD=90;
  const scale = fitScale({w:width, h:height});
  const pw=width*scale, ph=height*scale;

  const x0=(W-pw)/2, y0=(H-ph)/2;

  dashedLine(x0, H/2, x0+pw, H/2, '#2a3050');
  dashedLine(W/2, y0, W/2, y0+ph, '#2a3050');

  ctx.fillStyle=FILL;
  ctx.strokeStyle=ACCENT;
  ctx.lineWidth=2.5;
  ctx.fillRect(x0,y0,pw,ph);
  ctx.strokeRect(x0,y0,pw,ph);

  // diagonal
  ctx.strokeStyle=ACCENT2; ctx.lineWidth=1.5; ctx.setLineDash([6,4]);
  ctx.beginPath(); ctx.moveTo(x0,y0); ctx.lineTo(x0+pw,y0+ph); ctx.stroke();
  ctx.setLineDash([]);

  [[x0,y0],[x0+pw,y0],[x0+pw,y0+ph],[x0,y0+ph]].forEach(pt=>dot(...pt));

  edgeLabel(x0+pw/2, y0-16, `a = ${width}`, ACCENT);
  edgeLabel(x0+pw+20, y0+ph/2, `b = ${height}`, ACCENT);

  dimBox(x0+pw/2, y0-52, `${width}`, 'WIDTH', ACCENT);
  dimBox(x0+pw+64, y0+ph/2, `${height}`, 'HEIGHT', ACCENT);
  updateScaleLabel(scale, Math.max(width,height));
}

function drawCircle(p) {
  const { radius } = p;
  const W=canvas.width, H=canvas.height, PAD=90;
  const scale = Math.min((W-2*PAD)/(2*radius),(H-2*PAD)/(2*radius));
  const pr = radius*scale;
  const cx=W/2, cy=H/2;

  // guides
  dashedLine(cx-pr,cy,cx+pr,cy);
  dashedLine(cx,cy-pr,cx,cy+pr);

  ctx.fillStyle=FILL;
  ctx.strokeStyle=ACCENT;
  ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.arc(cx,cy,pr,0,Math.PI*2);
  ctx.fill(); ctx.stroke();

  // radius line
  ctx.strokeStyle=ACCENT2; ctx.lineWidth=1.5; ctx.setLineDash([6,4]);
  ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+pr,cy); ctx.stroke();
  ctx.setLineDash([]);

  dot(cx,cy,ACCENT,4);
  dot(cx+pr,cy,ACCENT2,5);

  edgeLabel(cx+pr/2, cy-12, `r = ${radius}`, ACCENT2);
  dimBox(cx+pr+60, cy, `${radius}`, 'RADIUS', ACCENT);
  updateScaleLabel(scale, radius);
}

function drawEquilateral(p) {
  const { side } = p;
  const W=canvas.width, H=canvas.height, PAD=90;
  const h = side * Math.sqrt(3)/2;
  const scale = fitScale({w:side, h:h});
  const ps=side*scale, ph=h*scale;

  const cx=W/2, cy=H/2;
  const A=[cx, cy-ph*2/3];
  const B=[cx+ps/2, cy+ph/3];
  const C=[cx-ps/2, cy+ph/3];

  dashedLine(cx,A[1],cx,B[1],'#2a3050');

  ctx.fillStyle=FILL;
  ctx.strokeStyle=GREEN;
  ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.moveTo(...A); ctx.lineTo(...B); ctx.lineTo(...C); ctx.closePath();
  ctx.fill(); ctx.stroke();

  [A,B,C].forEach(pt=>dot(...pt,GREEN));

  edgeLabel((B[0]+C[0])/2, B[1]+18, `a = ${side}`, GREEN);
  edgeLabel((A[0]+B[0])/2+22,(A[1]+B[1])/2, `a = ${side}`, GREEN);
  edgeLabel((A[0]+C[0])/2-22,(A[1]+C[1])/2, `a = ${side}`, GREEN);

  dimBox(cx, B[1]+54, `${side}`, 'SIDE', GREEN);
  updateScaleLabel(scale, side);
}

function drawPolygon(p) {
  const n=Math.round(p.sides), r=p.radius;
  const W=canvas.width, H=canvas.height, PAD=90;
  const scale = Math.min((W-2*PAD)/(2*r),(H-2*PAD)/(2*r));
  const pr=r*scale;
  const cx=W/2, cy=H/2;

  // circumcircle guide
  ctx.strokeStyle=MUTED; ctx.lineWidth=1; ctx.setLineDash([3,5]);
  ctx.beginPath(); ctx.arc(cx,cy,pr,0,Math.PI*2); ctx.stroke();
  ctx.setLineDash([]);

  const pts=[];
  for(let i=0;i<n;i++){
    const a = i*2*Math.PI/n - Math.PI/2;
    pts.push([cx+pr*Math.cos(a), cy+pr*Math.sin(a)]);
  }

  ctx.fillStyle=FILL2;
  ctx.strokeStyle=PURPLE;
  ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.moveTo(...pts[0]);
  pts.slice(1).forEach(pt=>ctx.lineTo(...pt));
  ctx.closePath(); ctx.fill(); ctx.stroke();

  pts.forEach(pt=>dot(...pt,PURPLE));

  // radius line to first vertex
  ctx.strokeStyle=ACCENT2; ctx.lineWidth=1; ctx.setLineDash([5,4]);
  ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(...pts[0]); ctx.stroke();
  ctx.setLineDash([]);
  dot(cx,cy,MUTED,4);

  const mid=((pts[0][0]+pts[1][0])/2+4);
  edgeLabel(pts[0][0]+14, pts[0][1], `r = ${r}`, ACCENT2);
  dimBox(cx, cy+pr+62, `${n}`, 'SIDES', PURPLE);
  dimBox(cx+pr+68, cy, `${r}`, 'RADIUS', ACCENT);
  updateScaleLabel(scale, r);
}

function drawEllipse(p) {
  const {a, b} = p;
  const W=canvas.width, H=canvas.height, PAD=90;
  const scale = fitScale({w:2*a, h:2*b});
  const pa=a*scale, pb=b*scale;
  const cx=W/2, cy=H/2;

  dashedLine(cx-pa,cy,cx+pa,cy);
  dashedLine(cx,cy-pb,cx,cy+pb);

  ctx.fillStyle=FILL;
  ctx.strokeStyle=AMBER;
  ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.ellipse(cx,cy,pa,pb,0,0,Math.PI*2);
  ctx.fill(); ctx.stroke();

  // foci
  const ma=Math.max(a,b), mb=Math.min(a,b);
  const c_=Math.sqrt(ma*ma-mb*mb)*scale;
  const horizontal = a>=b;
  const f1=[cx+(horizontal?c_:0), cy+(horizontal?0:c_)];
  const f2=[cx-(horizontal?c_:0), cy-(horizontal?0:c_)];
  dot(...f1,ACCENT2,4); dot(...f2,ACCENT2,4);

  dot(cx+pa,cy,AMBER); dot(cx-pa,cy,AMBER);
  dot(cx,cy+pb,AMBER); dot(cx,cy-pb,AMBER);

  ctx.strokeStyle=ACCENT2; ctx.lineWidth=1; ctx.setLineDash([5,4]);
  ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+pa,cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx,cy-pb); ctx.stroke();
  ctx.setLineDash([]);
  dot(cx,cy,MUTED,4);

  edgeLabel(cx+pa/2, cy+14, `a = ${a}`, AMBER);
  edgeLabel(cx-16, cy-pb/2, `b = ${b}`, AMBER);

  dimBox(cx+pa+70, cy, `${a}`, 'SEMI-MAJ', AMBER);
  dimBox(cx, cy-pb-52, `${b}`, 'SEMI-MIN', AMBER);
  updateScaleLabel(scale, Math.max(a,b));
}

// ── scale label ───────────────────────────────────────────────────────────────
function updateScaleLabel(scale, larger) {
  const el = document.getElementById('stat-scale');
  const DRAW_UNITS = 10;
  const ratio = DRAW_UNITS / larger;
  if (Math.abs(ratio-1) < 0.005) el.textContent = 'scale: 1 : 1';
  else if (ratio > 1)              el.textContent = `scale: ×${ratio.toFixed(2)} (zoomed in)`;
  else                             el.textContent = `scale: ×${ratio.toFixed(3)} (zoomed out)`;
}

// ── main draw ─────────────────────────────────────────────────────────────────
function redraw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle=BG; ctx.fillRect(0,0,canvas.width,canvas.height);
  drawGrid();

  const def = SHAPES[shape];
  const p = {};
  let valid = true;
  def.fields.forEach(f => {
    const v = params[f.id];
    if (v === undefined || v <= 0 || isNaN(v)) valid = false;
    p[f.id] = v;
  });

  if (!valid) {
    ctx.font = '13px "Courier New",monospace';
    ctx.fillStyle = '#6b7280';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('enter dimensions to visualize', canvas.width/2, canvas.height/2);
    document.getElementById('result-value').textContent = '—';
    document.getElementById('formula').textContent = '—';
    ['stat-area','stat-perim','stat-angles','stat-extra'].forEach(id=>document.getElementById(id).textContent='—');
    return;
  }

  def.draw(p);

  const b = def.banner(p);
  document.getElementById('result-value').textContent = b.value;
  document.getElementById('formula').textContent = b.formula;

  const s = def.stats(p);
  document.getElementById('stat-area').textContent   = s.area;
  document.getElementById('stat-perim').textContent  = s.perim;
  document.getElementById('stat-angles').textContent = s.angles;
  document.getElementById('stat-extra').textContent  = s.extra;
}

// ── build input fields ────────────────────────────────────────────────────────
function buildInputs() {
  const container = document.getElementById('inputs');
  container.innerHTML = '';
  const def = SHAPES[shape];
  def.fields.forEach(f => {
    const label = document.createElement('div');
    label.className = 'field-label';
    label.textContent = f.label;
    container.appendChild(label);

    if (f.isRange) {
      const slider = document.createElement('input');
      slider.type  = 'range';
      slider.min   = f.min ?? 3;
      slider.max   = f.max ?? 12;
      slider.step  = 1;
      slider.value = params[f.id] ?? f.default;
      const readout = document.createElement('div');
      readout.className = 'stat-value';
      readout.style.marginTop = '-6px';
      readout.style.marginBottom = '10px';
      readout.textContent = slider.value;
      slider.addEventListener('input', () => {
        params[f.id] = parseFloat(slider.value);
        readout.textContent = slider.value;
        redraw();
      });
      container.appendChild(slider);
      container.appendChild(readout);
    } else {
      const input = document.createElement('input');
      input.type  = 'number';
      input.min   = '0.01';
      input.step  = '0.5';
      input.value = params[f.id] ?? f.default;
      input.addEventListener('input', () => {
        const v = parseFloat(input.value);
        params[f.id] = isNaN(v) ? null : v;
        redraw();
      });
      container.appendChild(input);
    }

    // init params
    if (params[f.id] === undefined) params[f.id] = f.default;
  });
}

// ── shape button wiring ───────────────────────────────────────────────────────
document.querySelectorAll('.shape-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.shape-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    shape  = btn.dataset.shape;
    params = {};
    buildInputs();
    redraw();
  });
});

// ── responsive resize ─────────────────────────────────────────────────────────
window.addEventListener('resize', resizeCanvas);
// ── init ──────────────────────────────────────────────────────────────────────
buildInputs();
resizeCanvas();
</script>
